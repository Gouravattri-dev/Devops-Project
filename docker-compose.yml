version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: gourav
      POSTGRES_PASSWORD: devops123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
